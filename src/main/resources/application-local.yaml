auth-server:
  base-url: http://localhost:8080

spring:
  security:
    oauth2:
      client:
        registration:
          auth-server:
            client-id: local-admin-server
            client-secret: ${ADMIN_CLIENT_SECRET:change-me}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile
          m2m-client:
            client-id: local-m2m-client
            client-secret: ${M2M_CLIENT_SECRET:local-m2m-secret}
            authorization-grant-type: client_credentials
            scope: client:manage
            provider: auth-server
        provider:
          auth-server:
            issuer-uri: http://localhost:8080
  datasource:
    url: jdbc:h2:mem:admindb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  thymeleaf:
    cache: false

logging:
  level:
    kr.it.rudy: DEBUG
    org.springframework.security: DEBUG
